<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 340px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #e5e5e5; }

/* Header */
.header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid #1f1f1f;
}
.header h1 {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header h1 svg { color: #3b82f6; }
.header p { font-size: 11px; color: #737373; margin-top: 4px; }

/* Status card */
.status-card {
  margin: 14px 16px;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid #1f1f1f;
  background: #111;
}
.status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
}
.status-row + .status-row { margin-top: 8px; }
.status-label { color: #737373; }
.status-value { color: #e5e5e5; font-weight: 500; }
.status-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  margin-right: 6px;
}
.dot-green { background: #22c55e; }
.dot-red { background: #ef4444; }
.dot-yellow { background: #eab308; }

/* Actions */
.actions {
  padding: 0 16px 14px;
  display: flex;
  gap: 8px;
}
.btn {
  flex: 1;
  padding: 9px 12px;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-primary {
  background: #3b82f6;
  color: #fff;
}
.btn-primary:hover { background: #2563eb; }
.btn-primary:disabled { background: #1e3a5f; color: #5b8dd4; cursor: not-allowed; }
.btn-secondary {
  background: #1f1f1f;
  color: #d4d4d4;
}
.btn-secondary:hover { background: #2a2a2a; }

/* Settings */
.settings {
  padding: 0 16px 16px;
  display: none;
}
.settings.open { display: block; }
.settings h3 {
  font-size: 12px;
  color: #737373;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.field {
  margin-bottom: 10px;
}
.field label {
  display: block;
  font-size: 11px;
  color: #a3a3a3;
  margin-bottom: 4px;
}
.field input {
  width: 100%;
  padding: 8px 10px;
  background: #111;
  border: 1px solid #2a2a2a;
  border-radius: 6px;
  color: #e5e5e5;
  font-size: 12px;
  font-family: "SF Mono", Menlo, monospace;
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus { border-color: #3b82f6; }
.field input::placeholder { color: #525252; }

.settings-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

/* Toggle */
.toggle-settings {
  width: 100%;
  padding: 10px;
  background: none;
  border: none;
  border-top: 1px solid #1f1f1f;
  color: #737373;
  font-size: 11px;
  cursor: pointer;
  transition: color 0.15s;
}
.toggle-settings:hover { color: #a3a3a3; }

/* Feedback messages */
.feedback {
  font-size: 11px;
  padding: 8px 12px;
  border-radius: 6px;
  margin: 0 16px 10px;
  display: none;
}
.feedback.show { display: block; }
.feedback.success { background: #052e16; color: #4ade80; border: 1px solid #14532d; }
.feedback.error { background: #2a0a0a; color: #f87171; border: 1px solid #450a0a; }
</style>
</head>
<body>

<div class="header">
  <h1>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
      <polyline points="17 21 17 13 7 13 7 21"/>
      <polyline points="7 3 7 8 15 8"/>
    </svg>
    Social Saver Pro
  </h1>
  <p>Save, categorize &amp; act on your X bookmarks</p>
</div>

<div class="status-card">
  <div class="status-row">
    <span class="status-label">Connection</span>
    <span class="status-value" id="conn-status">
      <span class="status-dot dot-yellow" id="conn-dot"></span>
      <span id="conn-text">Checking...</span>
    </span>
  </div>
  <div class="status-row">
    <span class="status-label">Saved</span>
    <span class="status-value" id="total-count">—</span>
  </div>
  <div class="status-row">
    <span class="status-label">Last sync</span>
    <span class="status-value" id="last-sync">Never</span>
  </div>
</div>

<div class="feedback" id="feedback"></div>

<div class="actions">
  <button class="btn btn-primary" id="sync-btn" disabled>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="23 4 23 10 17 10"/>
      <polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    Sync Now
  </button>
  <button class="btn btn-secondary" id="dashboard-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7"/>
      <rect x="14" y="3" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/>
    </svg>
    Dashboard
  </button>
</div>

<div class="settings" id="settings-panel">
  <h3>Supabase Configuration</h3>
  <div class="field">
    <label>Project URL</label>
    <input type="text" id="input-url" placeholder="https://xxxxx.supabase.co" />
  </div>
  <div class="field">
    <label>Anon / Public Key</label>
    <input type="password" id="input-key" placeholder="eyJhbGciOi..." />
  </div>
  <div class="settings-actions">
    <button class="btn btn-primary" id="save-config-btn">Save & Test</button>
    <button class="btn btn-secondary" id="cancel-config-btn">Cancel</button>
  </div>
</div>

<button class="toggle-settings" id="toggle-settings">⚙ Settings</button>

<script src="popup.js"></script>
</body>
</html>
